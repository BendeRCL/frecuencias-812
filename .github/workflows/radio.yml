name: Frecuencia Discord

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  enviar:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar script
        run: python main.py
        env:
          WEBHOOK: ${{ secrets.WEBHOOK }}
